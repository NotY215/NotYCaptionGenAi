plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.noty'
version = '3.0.2'

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'commons-io:commons-io:2.11.0'
}

application {
    mainClass = 'com.noty.captiongen.MainApp'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.compilerArgs << '-Xlint:deprecation'
}

// Disable the default jar task
tasks.jar {
    enabled = false
}

// Configure shadowJar
shadowJar {
    archiveBaseName.set('NotYCaptionGenAi')
    archiveClassifier.set('')
    archiveVersion.set(project.version.toString())
    
    manifest {
        attributes 'Main-Class': 'com.noty.captiongen.MainApp'
    }
    
    mergeServiceFiles()
    
    // Include all resources
    from(sourceSets.main.resources) {
        into('/')
    }
    
    // Exclude signature files
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
    
    // Minimize the JAR (optional)
    minimize()
}

// Make the build task depend on shadowJar
tasks.build {
    dependsOn shadowJar
}

// Configure distribution tasks to use shadowJar
tasks.distTar {
    dependsOn shadowJar
    enabled = false
}

tasks.distZip {
    dependsOn shadowJar
    enabled = false
}

tasks.startScripts {
    dependsOn shadowJar
    enabled = false
}

// Clean task
tasks.clean {
    delete 'build'
    delete 'logs'
    delete 'temp'
}

// Task to run the console app
task runConsole(type: JavaExec) {
    dependsOn shadowJar
    mainClass = 'com.noty.captiongen.MainApp'
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in
}

// Task to create distribution
task createDist(type: Copy) {
    dependsOn shadowJar
    from 'build/libs'
    into 'dist'
    include '*.jar'
    
    doLast {
        println "========================================"
        println "Distribution created in dist folder"
        println "Run with: java -jar dist/NotYCaptionGenAi-${project.version}.jar"
        println "========================================"
    }
}

// Make shadowJar the default
defaultTasks 'shadowJar'